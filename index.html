<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="theme-color" content="#1A3566" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Per-route head tags (title, description, canonical, hreflang, OG, Twitter)
         are injected by SEOHead via react-helmet on every route. -->
    <meta name="author" content="Hadar Yatzkan — HY Law Offices" />

    <!-- LegalService structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LegalService",
      "@id": "https://ai-lawyer.co.il/#firm",
      "name": "HY Law Offices — Hadar Yatzkan",
      "url": "https://ai-lawyer.co.il/",
      "description": "Boutique law firm specializing in intellectual property, technology law, internet defamation (lashon hara), AI-related legal services, and commercial litigation. Based in Givatayim, Israel.",
      "telephone": "+972542234726",
      "email": "Hadar@ai-lawyer.co.il",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "46 Weizmann St",
        "addressLocality": "Givatayim",
        "addressCountry": "IL"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Israel"
      },
      "founder": {
        "@type": "Person",
        "@id": "https://ai-lawyer.co.il/#founder",
        "name": "Hadar Yatzkan",
        "jobTitle": "Founder & Managing Attorney",
        "description": "LL.M. in Law and Technology. Specializes in intellectual property, trademarks, copyright, technology law, AI law, and commercial litigation.",
        "worksFor": { "@id": "https://ai-lawyer.co.il/#firm" }
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Legal Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Intellectual Property Law" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Trademark Registration & Enforcement" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Copyright & Digital Content Law" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI & Technology Law" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Technology & Internet Law" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Defamation & Internet Law" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Commercial Litigation" } }
        ]
      }
    }
    </script>

    <!-- WebSite structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://ai-lawyer.co.il/#website",
      "url": "https://ai-lawyer.co.il/",
      "name": "HY Law Offices | Hadar Yatzkan",
      "description": "Boutique IP, technology, and AI law firm in Givatayim, Israel.",
      "publisher": { "@id": "https://ai-lawyer.co.il/#firm" },
      "inLanguage": ["he", "en"]
    }
    </script>

    <!-- Google tag (gtag.js) — Consent Mode v2: default denied until user accepts -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9CN7ZJ2RST"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        wait_for_update: 500
      });
      gtag('js', new Date());
      gtag('config', 'G-9CN7ZJ2RST');
    </script>

    <!-- Theme initialisation: runs synchronously before first paint to avoid flash of wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("hy-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = stored === "dark" || (!stored && prefersDark);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
